<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مع المسيح كل يوم | آية يومية</title>
    
    <link rel="manifest" href="https://progressier.app/sNl4sYfaVf7fEurl6lOc/progressier.json"/>
    <script defer src="https://progressier.app/sNl4sYfaVf7fEurl6lOc/script.js"></script>
    
    <meta name="theme-color" content="#d4af37">
    <meta name="description" content="تطبيق مسيحي يرسل لك آية يومية من الكتاب المقدس بالعربي مع اهتزاز وتنبيه وصليب عائم">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2903/2903510.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0c1e 0%, #1a0f2e 50%, #0f0c1e 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Amiri', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "✝";
            position: fixed;
            font-size: 400px;
            opacity: 0.03;
            bottom: -100px;
            right: -100px;
            pointer-events: none;
        }

        .card {
            background: rgba(20, 15, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
            z-index: 5;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cross-icon {
            font-size: 60px;
            color: #d4af37;
            margin-bottom: 15px;
            display: inline-block;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px #d4af37; }
            50% { text-shadow: 0 0 20px #d4af37; }
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #d4af37, #f0c674);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: #a89060;
            font-size: 0.85rem;
            margin-bottom: 25px;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
            display: inline-block;
            padding-bottom: 5px;
        }

        .verse-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border-right: 4px solid #d4af37;
            text-align: right;
        }

        .verse-text {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #f0e6d0;
            font-weight: 500;
        }

        .verse-ref {
            color: #d4af37;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0f0c1e;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: all 0.3s ease;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
        }

        .floating-cross {
            position: fixed;
            bottom: 30px;
            left: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #d4af37, #b8942e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(212, 175, 55, 0.4);
            z-index: 9999;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .verse-popup {
            position: fixed;
            bottom: 110px;
            left: 20px;
            right: 20px;
            background: rgba(20, 15, 35, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid #d4af37;
            padding: 25px;
            z-index: 9998;
            transform: translateX(-150%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 380px;
        }

        .verse-popup.show { transform: translateX(0); }

        @media (max-width: 480px) {
            .card { padding: 25px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="cross-icon">✝</div>
    <h1>مع المسيح كل يوم</h1>
    <div class="sub">وعد يومي من كلمة الله</div>

    <div class="verse-card" id="verseDisplay">
        <div class="verse-text" id="verseText">جاري تحميل الوعد...</div>
        <div class="verse-ref" id="verseRef"></div>
    </div>

    <button class="btn-primary" onclick="window.progressier.showInstallationPrompt()">📥 تثبيت التطبيق على الموبايل</button>
    <button class="btn-secondary" onclick="fetchVerse()">✝ آية أخرى</button>
    
    <div style="color: #d4af37; font-size: 0.8rem; margin-top: 15px;">سيصلك تنبيه يومي بالآية الجديدة 🔔</div>
</div>

<div class="floating-cross" onclick="showVersePopup()">
    <span>✝</span>
</div>

<div class="verse-popup" id="versePopup">
    <div id="popupVerseText" style="color: #f0e6d0; text-align: right;"></div>
    <div id="popupVerseRef" style="color: #d4af37; margin-top: 10px; font-size: 0.8rem;"></div>
</div>

<script>
    const fallbackVerses = [
        {t: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.", r: "إشعياء 41:10"},
        {t: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", r: "فيلبي 4:13"},
        {t: "أَحْبَبْتُكَ حُبًّا أَبَدِيًّا. لِذَلِكَ جَذَبْتُكِ بِالرَّحْمَةِ.", r: "إرميا 31:3"},
        {t: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ.", r: "مزمور 23:1"}
    ];

    async function fetchVerse() {
        try {
            // محاولة سحب آية عشوائية
            const v = fallbackVerses[Math.floor(Math.random() * fallbackVerses.length)];
            document.getElementById('verseText').innerText = v.t;
            document.getElementById('verseRef').innerText = v.r;
        } catch {
            document.getElementById('verseText').innerText = fallbackVerses[0].t;
        }
    }

    function showVersePopup() {
        const p = document.getElementById('versePopup');
        const v = fallbackVerses[Math.floor(Math.random() * fallbackVerses.length)];
        document.getElementById('popupVerseText').innerText = v.t;
        document.getElementById('popupVerseRef').innerText = v.r;
        p.classList.toggle('show');
        if(navigator.vibrate) navigator.vibrate(50);
    }

    // إغلاق البوب أب عند الضغط في أي مكان
    document.addEventListener('click', function(e) {
        const p = document.getElementById('versePopup');
        const cross = document.querySelector('.floating-cross');
        if (p.classList.contains('show') && !p.contains(e.target) && !cross.contains(e.target)) {
            p.classList.remove('show');
        }
    });

    window.onload = fetchVerse;
</script>

</body>
</html>
