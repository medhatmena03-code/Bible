<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0c1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>مع المسيح كل يوم</title>
    
    <link rel="manifest" href="manifest.json">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c1e, #1a0f2e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(20, 15, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid #d4af37;
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .cross-icon { font-size: 60px; color: #d4af37; animation: glow 2s infinite; }
        @keyframes glow { 0%,100% { text-shadow: 0 0 5px #d4af37; } 50% { text-shadow: 0 0 20px #d4af37; } }
        h1 { font-size: 2rem; color: #d4af37; margin-bottom: 8px; }
        .verse-card {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border-right: 4px solid #d4af37;
        }
        .verse-text { font-size: 1.25rem; line-height: 1.8; color: #f0e6d0; }
        .verse-ref { color: #d4af37; margin-top: 15px; }
        input[type="time"] {
            background: rgba(0,0,0,0.6);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px;
            border-radius: 50px;
            width: 150px;
            margin: 10px 0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0f0c1e;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px;
            border-radius: 50px;
            width: 100%;
            margin: 5px 0;
            cursor: pointer;
        }
        .floating-cross {
            position: fixed;
            bottom: 30px;
            left: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #d4af37, #b8942e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            animation: bounce 2s infinite;
        }
        .floating-cross span { font-size: 38px; color: #0f0c1e; font-weight: bold; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .verse-popup {
            position: fixed;
            bottom: 110px;
            left: 20px;
            right: 20px;
            background: rgba(20,15,35,0.98);
            border-radius: 30px;
            border: 1px solid #d4af37;
            padding: 25px;
            z-index: 9998;
            transform: translateX(-150%);
            transition: transform 0.4s ease;
            max-width: 380px;
        }
        .verse-popup.show { transform: translateX(0); }
        .verse-popup .close-btn {
            position: absolute;
            top: 12px;
            left: 15px;
            background: rgba(212,175,55,0.2);
            border: none;
            color: #d4af37;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            background: rgba(212,175,55,0.1);
            color: #d4af37;
            display: none;
        }
        #status.show { display: block; }
    </style>
</head>
<body>

<div class="card">
    <div class="cross-icon">✝</div>
    <h1>مع المسيح كل يوم</h1>
    <div class="verse-card">
        <div class="verse-text" id="verseText">جاري تحميل الآية...</div>
        <div class="verse-ref" id="verseRef"></div>
    </div>
    <input type="time" id="reminderTime" value="08:00">
    <button class="btn-primary" onclick="setupReminder()">🔔 فعّل التذكير اليومي</button>
    <button class="btn-secondary" onclick="sendTest()">✝ جرب التنبيه الآن</button>
    <div id="status"></div>
</div>

<div class="floating-cross" onclick="showVersePopup()">
    <span>✝</span>
</div>

<div class="verse-popup" id="versePopup">
    <button class="close-btn" onclick="closeVersePopup()">✕</button>
    <div class="verse-text" id="popupVerseText"></div>
    <div class="verse-ref" id="popupVerseRef"></div>
</div>

<script>
    // تفعيل الـ Service Worker عشان الإشعارات تشتغل صح
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
        });
    }

    const fallbackVerses = [
        {t: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.", r: "إشعياء 41:10"},
        {t: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ.", r: "مزمور 23:1"},
        {t: "أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ.", r: "يوحنا 14:6"},
        {t: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", r: "فيلبي 4:13"}
    ];

    function vibratePhone() { if (navigator.vibrate) navigator.vibrate([400, 100, 400]); }

    async function fetchVerse() {
        try {
            const randomBook = Math.floor(Math.random() * 76) + 1;
            const randomChapter = Math.floor(Math.random() * 50) + 1;
            const randomVerse = Math.floor(Math.random() * 30) + 1;
            const response = await fetch(`https://cdn.jsdelivr.net/gh/wldeh/bible-api/bibles/ar-vandyck/books/${randomBook}/chapters/${randomChapter}/verses/${randomVerse}.json`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            return { t: data.text, r: `${data.book_name || 'الكتاب المقدس'} ${randomChapter}:${randomVerse}` };
        } catch(e) {
            return fallbackVerses[Math.floor(Math.random() * fallbackVerses.length)];
        }
    }

    async function showVerse() {
        const verse = await fetchVerse();
        document.getElementById('verseText').innerHTML = verse.t;
        document.getElementById('verseRef').innerHTML = verse.r;
        vibratePhone();
        if (Notification.permission === "granted") {
            new Notification("✝ كلمة الله لك اليوم", {
                body: `${verse.t.substring(0, 80)} (${verse.r})`,
                icon: "logo.png", // تم تغيير الأيقونة هنا
                vibrate: [200, 100, 200]
            });
        }
    }

    async function showVersePopup() {
        const verse = await fetchVerse();
        document.getElementById('popupVerseText').innerHTML = verse.t;
        document.getElementById('popupVerseRef').innerHTML = verse.r;
        document.getElementById('versePopup').classList.add('show');
        vibratePhone();
    }

    function closeVersePopup() {
        document.getElementById('versePopup').classList.remove('show');
    }

    function setupReminder() {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                const time = document.getElementById('reminderTime').value;
                localStorage.setItem('reminder_time', time);
                document.getElementById('status').innerHTML = `✅ تم التفعيل الساعة ${time}`;
                document.getElementById('status').classList.add('show');
                vibratePhone();
                registerAlarm();
            } else {
                alert("الرجاء السماح بالإشعارات");
            }
        });
    }

    async function sendTest() {
        if (Notification.permission === "granted") {
            await showVerse();
        } else {
            setupReminder();
        }
    }

    function registerAlarm() {
        if (window.iappyx && window.iappyx.Alarms) {
            const targetTime = localStorage.getItem('reminder_time');
            if (targetTime) {
                const [hours, minutes] = targetTime.split(':');
                const alarmTime = new Date();
                alarmTime.setHours(parseInt(hours), parseInt(minutes), 0, 0);
                
                window.iappyx.Alarms.setDaily(
                    "daily_verse_alarm",
                    alarmTime.getTime(),
                    () => { showVerse(); }
                );
            }
        } else {
            startChecking();
        }
    }

    let checkInterval = null;
    function startChecking() {
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(async () => {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            const targetTime = localStorage.getItem('reminder_time');
            if (targetTime && currentTime === targetTime) {
                await showVerse();
            }
        }, 30000);
    }

    document.addEventListener('click', function(event) {
        const popup = document.getElementById('versePopup');
        const cross = document.querySelector('.floating-cross');
        if (popup.classList.contains('show') && !popup.contains(event.target) && !cross.contains(event.target)) {
            closeVersePopup();
        }
    });

    window.onload = async () => {
        const verse = await fetchVerse();
        document.getElementById('verseText').innerHTML = verse.t;
        document.getElementById('verseRef').innerHTML = verse.r;
        
        const savedTime = localStorage.getItem('reminder_time');
        if (savedTime) {
            document.getElementById('reminderTime').value = savedTime;
            document.getElementById('status').innerHTML = `✅ النظام نشط - التذكير الساعة ${savedTime}`;
            document.getElementById('status').classList.add('show');
            registerAlarm();
        }
    };
</script>

</body>
</html>
