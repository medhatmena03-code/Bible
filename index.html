<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مع المسيح كل يوم | آية يومية من الكتاب المقدس</title>
    <meta name="theme-color" content="#d4af37">
    <meta name="description" content="تطبيق مسيحي يرسل لك آية يومية من الكتاب المقدس بالعربي مع اهتزاز وتنبيه وصليب عائم">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2903/2903510.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0c1e 0%, #1a0f2e 50%, #0f0c1e 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Amiri', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "✝";
            position: fixed;
            font-size: 400px;
            opacity: 0.03;
            bottom: -100px;
            right: -100px;
            pointer-events: none;
            font-family: serif;
        }

        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #d4af37, transparent);
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        .flash.active {
            opacity: 0.6;
        }

        .card {
            background: rgba(20, 15, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cross-icon {
            font-size: 60px;
            color: #d4af37;
            margin-bottom: 15px;
            display: inline-block;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px #d4af37; }
            50% { text-shadow: 0 0 20px #d4af37; }
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #d4af37, #f0c674);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .sub {
            color: #a89060;
            font-size: 0.85rem;
            margin-bottom: 25px;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
            display: inline-block;
            padding-bottom: 5px;
        }

        .verse-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border-right: 4px solid #d4af37;
            text-align: right;
        }

        .verse-text {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #f0e6d0;
            font-weight: 500;
        }

        .verse-ref {
            color: #d4af37;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        input[type="time"] {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px 15px;
            border-radius: 50px;
            font-size: 1.1rem;
            text-align: center;
            width: 150px;
            margin: 10px 0;
            font-family: monospace;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0f0c1e;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: all 0.3s ease;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
        }

        .btn-secondary:active {
            background: rgba(212, 175, 55, 0.2);
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            font-size: 0.8rem;
            display: none;
        }

        #status.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bible-icon {
            font-size: 12px;
            letter-spacing: 2px;
            color: #d4af37;
            margin-top: 20px;
            opacity: 0.7;
        }

        .floating-cross {
            position: fixed;
            bottom: 30px;
            left: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #d4af37, #b8942e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(212, 175, 55, 0.4);
            z-index: 9999;
            transition: all 0.3s ease;
            animation: bounce 2s infinite;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .floating-cross:active {
            transform: scale(0.95);
        }

        .floating-cross span {
            font-size: 38px;
            color: #0f0c1e;
            font-weight: bold;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .verse-popup {
            position: fixed;
            bottom: 110px;
            left: 20px;
            right: 20px;
            background: rgba(20, 15, 35, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid #d4af37;
            padding: 25px;
            z-index: 9998;
            transform: translateX(-150%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 380px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .verse-popup.show {
            transform: translateX(0);
        }

        .verse-popup .close-btn {
            position: absolute;
            top: 12px;
            left: 15px;
            background: rgba(212, 175, 55, 0.2);
            border: none;
            color: #d4af37;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }

        .verse-popup .verse-text-pop {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #f0e6d0;
            text-align: right;
            margin-top: 15px;
            padding-right: 15px;
            border-right: 4px solid #d4af37;
        }

        .verse-popup .verse-ref-pop {
            color: #d4af37;
            margin-top: 18px;
            font-size: 0.85rem;
            text-align: left;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #d4af37;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card { padding: 25px 20px; }
            .verse-text { font-size: 1rem; }
            h1 { font-size: 1.5rem; }
            .cross-icon { font-size: 45px; }
            .floating-cross { width: 55px; height: 55px; bottom: 20px; left: 15px; }
            .floating-cross span { font-size: 32px; }
            .verse-popup { bottom: 90px; left: 15px; right: 15px; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="card">
    <div class="cross-icon">✝</div>
    <h1>مع المسيح كل يوم</h1>
    <div class="sub">آية من الكتاب المقدس بالعربي</div>

    <div class="verse-card" id="verseDisplay">
        <div class="verse-text" id="verseText">
            <span class="loading"></span> جاري تحميل الآية...
        </div>
        <div class="verse-ref" id="verseRef"></div>
    </div>

    <label style="color: #aaa; font-size: 0.8rem;">⏰ اختر وقت التذكير:</label>
    <br>
    <input type="time" id="reminderTime" value="08:00">
    
    <button class="btn-primary" onclick="setupReminder()">🔔 فعّل التذكير اليومي</button>
    <button class="btn-secondary" onclick="sendTest()">✝ جرب التنبيه الآن (اهتزاز)</button>
    
    <div id="status"></div>
    <div class="bible-icon">📖 الكتاب المقدس | العهد الجديد والقديم 📖</div>
</div>

<div class="floating-cross" onclick="showVersePopup()">
    <span>✝</span>
</div>

<div class="verse-popup" id="versePopup">
    <button class="close-btn" onclick="closeVersePopup()">✕</button>
    <div class="verse-text-pop" id="popupVerseText">جاري تحميل الآية...</div>
    <div class="verse-ref-pop" id="popupVerseRef"></div>
</div>

<script>
    const fallbackVerses = [
        {t: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ. أَيَّدْتُكَ وَأَعَنْتُكَ.", r: "إشعياء 41:10"},
        {t: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ. فِي مَرَاعٍ خُضْرٍ يُرْبِضُنِي.", r: "مزمور 23:1-2"},
        {t: "أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ. لَيْسَ أَحَدٌ يَأْتِي إِلَى الآبِ إِلاَّ بِي.", r: "يوحنا 14:6"},
        {t: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", r: "فيلبي 4:13"},
        {t: "أَحْبَبْتُكَ حُبًّا أَبَدِيًّا. لِذَلِكَ جَذَبْتُكِ بِالرَّحْمَةِ.", r: "إرميا 31:3"}
    ];

    function flashScreen() {
        const flash = document.getElementById('flash');
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 300);
    }

    function vibratePhone() {
        if (navigator.vibrate) navigator.vibrate([400, 100, 400, 100, 400]);
    }

    async function fetchVerseFromAPI() {
        const books = Array.from({length: 76}, (_, i) => i + 1);
        try {
            const randomBook = books[Math.floor(Math.random() * books.length)];
            const randomChapter = Math.floor(Math.random() * 50) + 1;
            const randomVerse = Math.floor(Math.random() * 30) + 1;
            const response = await fetch(`https://cdn.jsdelivr.net/gh/wldeh/bible-api/bibles/ar-vandyck/books/${randomBook}/chapters/${randomChapter}/verses/${randomVerse}.json`);
            if (!response.ok) throw new Error('API failed');
            const data = await response.json();
            if (data && data.text) {
                return { t: data.text, r: `${data.book_name || 'الكتاب المقدس'} ${randomChapter}:${randomVerse}` };
            }
            throw new Error('No verse data');
        } catch(error) {
            return fallbackVerses[Math.floor(Math.random() * fallbackVerses.length)];
        }
    }

    async function showVerseWithAlert() {
        const verse = await fetchVerseFromAPI();
        document.getElementById('verseText').innerHTML = verse.t;
        document.getElementById('verseRef').innerHTML = verse.r;
        flashScreen();
        vibratePhone();
        if (Notification.permission === "granted") {
            new Notification("✝ كلمة الله لك اليوم", {
                body: `${verse.t.substring(0, 80)}${verse.t.length > 80 ? '...' : ''} (${verse.r})`,
                icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                vibrate: [200, 100, 200],
                requireInteraction: true
            });
        }
    }

    async function showVersePopup() {
        const popup = document.getElementById('versePopup');
        const verse = await fetchVerseFromAPI();
        document.getElementById('popupVerseText').innerHTML = verse.t;
        document.getElementById('popupVerseRef').innerHTML = verse.r;
        popup.classList.add('show');
        vibratePhone();
    }

    function closeVersePopup() {
        document.getElementById('versePopup').classList.remove('show');
    }

    function setupReminder() {
        if (!("Notification" in window)) {
            alert("المتصفح لا يدعم الإشعارات");
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                const time = document.getElementById('reminderTime').value;
                localStorage.setItem('reminder_time', time);
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML = `✅ تم التفعيل! ستصل الآية يومياً الساعة ${time} مع اهتزاز ✝`;
                statusDiv.classList.add('show');
                vibratePhone();
                new Notification("✝ تم تفعيل التذكير", {
                    body: `ستصلك آية من الكتاب المقدس يومياً الساعة ${time}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png"
                });
                startChecking();
            } else {
                alert("✝ من فضلك اسمح بالإشعارات");
            }
        });
    }

    async function sendTest() {
        if (Notification.permission === "granted") {
            await showVerseWithAlert();
        } else {
            setupReminder();
        }
    }

    let lastNotifiedTime = "";
    let checkInterval = null;
    
    function startChecking() {
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(async () => {
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const targetTime = localStorage.getItem('reminder_time');
            if (targetTime && currentTime === targetTime && lastNotifiedTime !== currentTime) {
                await showVerseWithAlert();
                lastNotifiedTime = currentTime;
            }
            if (targetTime && currentTime !== targetTime) lastNotifiedTime = "";
        }, 30000);
    }

    document.addEventListener('click', function(event) {
        const popup = document.getElementById('versePopup');
        const cross = document.querySelector('.floating-cross');
        if (popup.classList.contains('show') && !popup.contains(event.target) && !cross.contains(event.target)) {
            closeVersePopup();
        }
    });

    window.onload = async () => {
        const verse = await fetchVerseFromAPI();
        document.getElementById('verseText').innerHTML = verse.t;
        document.getElementById('verseRef').innerHTML = verse.r;
        const savedTime = localStorage.getItem('reminder_time');
        if (savedTime) {
            document.getElementById('reminderTime').value = savedTime;
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `✅ النظام نشط - التذكير الساعة ${savedTime} ✝`;
            statusDiv.classList.add('show');
            startChecking();
        }
        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Service Worker registered:', reg);
            }).catch(err => {
                console.log('Service Worker failed:', err);
            });
        }
    };
</script>

</body>
</html>
